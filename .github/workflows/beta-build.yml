name: Beta Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Tauri App (macOS ${{ matrix.target }})
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Copy to Beta Preview Folder
        run: |
          mkdir -p beta-preview/macos
          cp src-tauri/target/${{ matrix.target }}/release/bundle/dmg/Ganymede_*.dmg beta-preview/macos/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Tauri App (Windows)
        run: npm run tauri build -- --target x86_64-pc-windows-msvc

      - name: Copy to Beta Preview Folder
        run: |
          New-Item -ItemType Directory -Force -Path beta-preview\windows
          Copy-Item src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/Ganymede_*.msi beta-preview\windows\
