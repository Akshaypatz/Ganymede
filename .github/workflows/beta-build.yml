name: Beta Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # Allows the action to commit files back to your repository

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: universal-apple-darwin

      - name: Build Tauri App (Universal macOS)
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifact
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/Ganymede_*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Tauri App (Windows x64)
        run: npm run tauri build -- --target x86_64-pc-windows-msvc

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/Ganymede_*.msi

  commit-to-beta-folder:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: temp-downloads

      - name: Organize and Move Files
        run: |
          # Create clean destination directories
          mkdir -p beta-preview/macos
          mkdir -p beta-preview/windows
          
          # Safely find and extract files from the temporary download folders
          find temp-downloads/macos-artifact -name "*.dmg" -exec cp {} beta-preview/macos/ \;
          find temp-downloads/windows-artifact -name "*.msi" -exec cp {} beta-preview/windows/ \;
          
          # Remove the temp folder so it doesn't get tracked by git
          rm -rf temp-downloads

      - name: Commit and Push Changes to GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automated update of beta-preview executables [skip ci]"
          file_pattern: 'beta-preview/*'
