name: Beta Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # Allows the action to commit files back to your repository

jobs:
  build-and-commit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build Tauri App (macOS Apple Silicon)
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Copy Installer to Beta Preview Folder
        run: |
          mkdir -p beta-preview/macos
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Ganymede_*.dmg beta-preview/macos/

      - name: Commit and Push Changes to GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automated update of macOS beta executable [skip ci]"
          file_pattern: 'beta-preview/*'
